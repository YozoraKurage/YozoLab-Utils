name: "Notify VPM Listing"

# Web UI などから手動で作成・編集された Release を検知し、
# vpmrepo-list 側のリスティング再ビルドを repository_dispatch でトリガーする。
#
# 注意:
#   release.yml が GITHUB_TOKEN で自動作成する Release では、この `release`
#   イベントは発火しない（GitHub の再帰防止仕様）。その経路は release.yml 内の
#   "Trigger VPM listing rebuild" ステップが担当する。
#   このワークフローは手動 Release / Release 編集をカバーするための補助。
on:
  release:
    types: [published, edited, released]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: "Trigger VPM listing rebuild"
        env:
          DISPATCH_TOKEN: ${{ secrets.LISTING_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::LISTING_DISPATCH_TOKEN secret is not set."
            exit 1
          fi
          curl --fail -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/YozoraKurage/vpmrepo-list/dispatches \
            -d '{"event_type":"yozolab-utils-release","client_payload":{"tag":"${{ github.event.release.tag_name }}"}}'
