name: "Notify VPM Listing"

# 手動 / Web UI から作成・編集された Release を検知し、VPM リスティング
# (vpmrepo-list) の再ビルドを repository_dispatch でトリガーする汎用ワークフロー。
#
# このファイルはリポジトリ固有の値を一切含まないため、VPM パッケージ用の
# どのリポジトリにもそのままコピーして使える。発信元の識別情報（リポジトリ名・
# タグ）は github コンテキストから自動取得し client_payload に載せる。
#
# 新しいパッケージリポジトリで使うときは:
#   1. このファイルをそのまま .github/workflows/ に置く
#   2. secret `LISTING_DISPATCH_TOKEN`（vpmrepo-list へ repository_dispatch
#      できる PAT）を設定する
#   3. 対象リポジトリを vpmrepo-list の source.json `githubRepos` に追加する
#
# 注意:
#   release.yml が GITHUB_TOKEN で自動作成する Release では、この `release`
#   イベントは発火しない（GitHub の再帰防止仕様）。その経路は release.yml 内の
#   "Trigger VPM listing rebuild" ステップが担当する。
#   このワークフローは手動 Release / Release 編集をカバーするための補助。
on:
  release:
    types: [published, edited, released]

env:
  # 再ビルド対象の VPM リスティングリポジトリ（全パッケージ共通）
  LISTING_REPO: "YozoraKurage/vpmrepo-list"
  # 全パッケージリポジトリで共通の dispatch イベント種別。
  # vpmrepo-list 側はこの 1 種類だけを購読すればよい。
  DISPATCH_EVENT_TYPE: "vpm-package-release"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: "Trigger VPM listing rebuild"
        env:
          DISPATCH_TOKEN: ${{ secrets.LISTING_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::LISTING_DISPATCH_TOKEN secret is not set."
            exit 1
          fi
          payload="$(jq -nc \
            --arg event "$DISPATCH_EVENT_TYPE" \
            --arg repo "$SOURCE_REPO" \
            --arg tag "$RELEASE_TAG" \
            '{event_type: $event, client_payload: {repository: $repo, tag: $tag}}')"
          curl --fail -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${LISTING_REPO}/dispatches" \
            -d "$payload"
